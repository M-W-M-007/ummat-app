name: iOS build

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "ios/**"
      - "capacitor.config.ts"
      - "package.json"
      - ".github/workflows/ios.yml"

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor (ios)
        run: npx cap sync ios

      - name: Install CocoaPods
        working-directory: ios/App
        run: pod install

      # Full signing needs an Apple Developer Program membership ($99/yr).
      # Add IOS_CERTIFICATE_BASE64 (a .p12 export), IOS_CERTIFICATE_PASSWORD,
      # IOS_PROVISIONING_PROFILE_BASE64, and IOS_TEAM_ID as repo secrets once
      # you have those. Until then this step is skipped and the archive step
      # below builds unsigned (CODE_SIGNING_ALLOWED=NO) — good enough to prove
      # the app compiles for iOS, not yet an installable/App-Store-ready IPA.
      - name: Import signing certificate & profile
        if: ${{ env.IOS_CERTIFICATE_BASE64 != '' }}
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD=$(uuidgen)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$IOS_CERTIFICATE_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN_PATH" -P "$IOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/"//g')

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision
          echo "SIGNED=1" >> "$GITHUB_ENV"

      - name: Build (signed archive)
        if: ${{ env.SIGNED == '1' }}
        working-directory: ios/App
        run: |
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Release \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            DEVELOPMENT_TEAM="${{ secrets.IOS_TEAM_ID }}" archive

      - name: Build (unsigned, pipeline check only)
        if: ${{ env.SIGNED != '1' }}
        working-directory: ios/App
        run: |
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Release \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            CODE_SIGNING_ALLOWED=NO archive

      - uses: actions/upload-artifact@v4
        with:
          name: ios-archive
          path: ${{ runner.temp }}/App.xcarchive
