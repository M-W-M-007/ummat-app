name: Android build

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "android/**"
      - "capacitor.config.ts"
      - "package.json"
      - ".github/workflows/android.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor (android)
        run: npx cap sync android

      # Signing is optional: add ANDROID_KEYSTORE_BASE64 / ANDROID_KEYSTORE_PASSWORD /
      # ANDROID_KEY_ALIAS / ANDROID_KEY_PASSWORD as repo secrets (Settings → Secrets
      # and variables → Actions) once you have a real keystore. Until then this
      # step is skipped and the build produces an UNSIGNED .aab/.apk — fine for
      # verifying the pipeline, not for uploading to the Play Store.
      - name: Write signing config
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/keystore.jks"
          cat > android/keystore.properties <<EOF
          storeFile=$RUNNER_TEMP/keystore.jks
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: Build Android App Bundle
        working-directory: android
        run: ./gradlew bundleRelease

      - name: Build Android APK (for quick device install/testing)
        working-directory: android
        run: ./gradlew assembleRelease

      - uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: |
            android/app/build/outputs/bundle/release/*.aab
            android/app/build/outputs/apk/release/*.apk
